name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive
        run: |
          xcodebuild \
            -project Macabolic.xcodeproj \
            -scheme Macabolic \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath build/Macabolic.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Create DMG
        run: |
          APP="build/Macabolic.xcarchive/Products/Applications/Macabolic.app"
          hdiutil create -volname Macabolic -srcfolder "$APP" -ov -format UDZO Macabolic.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Macabolic
          path: Macabolic.dmg
